<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate Arena v2 — Gemini Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #141417;
    --surface-card: #1e1e24;
    --border: #2d2d34;
    --text: #f3f4f6;
    --text-muted: #9ca3af;
    --green: #10b981;
    --purple: #8b5cf6;
    --amber: #f59e0b;
    --radius: 16px;
    --font-sans: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    padding: 2rem 1rem;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 850px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  header {
    text-align: center;
    margin-bottom: 0.5rem;
  }
  
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(to right, var(--green), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  header p {
    color: var(--text-muted);
    font-size: 1rem;
    margin-top: 0.4rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .input-group {
    margin-bottom: 1.5rem;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  
  @media (max-width: 650px) { 
    .grid-2 { grid-template-columns: 1fr; gap: 1rem; } 
  }

  label {
    display: block;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
    font-weight: 700;
  }

  input, textarea {
    width: 100%;
    background: var(--surface-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.85rem 1rem;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
  }

  button {
    background: var(--green);
    color: #050507;
    font-weight: 700;
    border: none;
    padding: 1rem 2rem;
    border-radius: 10px;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 1rem;
    transition: all 0.2s ease;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
  }
  
  button:hover { 
    opacity: 0.95;
    transform: translateY(-1px);
  }
  
  button:active { transform: translateY(1px); }
  
  button.secondary-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    width: auto;
  }
  button.secondary-btn:hover { background: var(--surface-card); }

  /* Arena Stage Screens */
  .arena-panel { display: none; }

  .chat-log {
    height: 480px;
    overflow-y: auto;
    border: 1px solid var(--border);
    background: #0d0d10;
    border-radius: var(--radius);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .bubble {
    max-width: 80%;
    padding: 1.2rem;
    border-radius: 14px;
    line-height: 1.6;
    font-size: 0.98rem;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @keyframes slideUp { 
    from { opacity: 0; transform: translateY(10px); } 
    to { opacity: 1; transform: translateY(0); } 
  }

  .bubble .meta {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: bold;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .bubble.side-a {
    background: rgba(16, 185, 129, 0.07);
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-left: 4px solid var(--green);
    align-self: flex-start;
  }
  .bubble.side-a .meta { color: var(--green); }

  .bubble.side-b {
    background: rgba(139, 92, 246, 0.07);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-left: 4px solid var(--purple);
    align-self: flex-end;
  }
  .bubble.side-b .meta { color: var(--purple); }

  .bubble.judge {
    background: rgba(245, 158, 11, 0.06);
    border: 1px solid rgba(245, 158, 11, 0.3);
    align-self: center;
    max-width: 95%;
    width: 100%;
    border-radius: 12px;
  }
  .bubble.judge .meta { color: var(--amber); text-align: center; border-bottom: 1px dashed rgba(245, 158, 11, 0.2); padding-bottom: 0.4rem; }

  .status-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 1rem;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>DEBATE ARENA</h1>
    <p>Solo Sandbox System Powered by Gemini API</p>
  </header>

  <div id="setup-panel" class="card">
    <div class="input-group">
      <label>Gemini API Key</label>
      <input type="password" id="api-key" placeholder="Paste your free AIzaSy... key here">
    </div>
    
    <div class="input-group">
      <label>Debate Topic</label>
      <input type="text" id="topic" value="Should AI code assistants eventually replace human junior developers?">
    </div>

    <div class="grid-2">
      <div>
        <label>Side A Stance / Name</label>
        <input type="text" id="name-a" value="Pro-AI Developer" style="margin-bottom: 0.5rem;">
        <textarea id="side-a-arg" rows="3">AI models optimize baseline code instantly, eliminate tedious syntax errors, and dramatically cut operational overhead.</textarea>
      </div>
      <div>
        <label>Side B Stance / Name</label>
        <input type="text" id="name-b" value="Human-First Engineer" style="margin-bottom: 0.5rem;">
        <textarea id="side-b-arg" rows="3">AI lacks true conceptual comprehension, introduces critical hidden security flaws, and halts the talent pipeline.</textarea>
      </div>
    </div>

    <button onclick="igniteSimulation()">⚔️ Launch Simulated Battle</button>
  </div>

  <div id="arena-panel" class="card arena-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
      <div>
        <label style="margin: 0;">Active Topic Matchup</label>
        <h3 id="display-topic" style="font-family: 'Syne', sans-serif; font-size: 1.25rem; color: #fff;">Topic</h3>
      </div>
      <button class="secondary-btn" onclick="resetApp()">Exit Arena</button>
    </div>

    <div class="chat-log" id="chat-log">
      </div>
    
    <div class="status-wrapper">
      <div class="spinner" id="loading-spinner"></div>
      <div id="status-text">System Standby</div>
    </div>
  </div>
</div>

<script>
  // UPDATED: Standard production v1 route using standard gemini-2.5-flash
  async function callGemini(apiKey, systemPrompt, userMessage) {
    const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
    
    const bodyPayload = {
      contents: [{ 
        role: "user",
        parts: [{ text: `${systemPrompt}\n\nTask instructions: ${userMessage}` }] 
      }],
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 300
      }
    };

    const networkResponse = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(bodyPayload)
    });

    if (!networkResponse.ok) {
      const errorResponse = await networkResponse.json();
      throw new Error(errorResponse.error?.message || "Unspecified response error inside API stream.");
    }

    const completeData = await networkResponse.json();
    return completeData.candidates[0].content.parts[0].text;
  }

  function appendChatBubble(roleClass, identityLabel, coreText) {
    const dialogueBox = document.getElementById('chat-log');
    const bubbleElement = document.createElement('div');
    bubbleElement.className = `bubble ${roleClass}`;
    
    bubbleElement.innerHTML = `
      <div class="meta">${identityLabel}</div>
      <div class="body-content">${coreText.replace(/\n/g, '<br>')}</div>
    `;
    
    dialogueBox.appendChild(bubbleElement);
    dialogueBox.scrollTop = dialogueBox.scrollHeight;
  }

  function updateStatus(text, showSpinner = false) {
    document.getElementById('status-text').innerText = text;
    document.getElementById('loading-spinner').style.display = showSpinner ? 'block' : 'none';
  }

  async function igniteSimulation() {
    const key = document.getElementById('api-key').value.trim();
    const topic = document.getElementById('topic').value.trim();
    const nameA = document.getElementById('name-a').value.trim();
    const nameB = document.getElementById('name-b').value.trim();
    const premiseA = document.getElementById('side-a-arg').value.trim();
    const premiseB = document.getElementById('side-b-arg').value.trim();

    if (!key) {
      alert("Please supply your Gemini API key to run the engine.");
      return;
    }

    // Toggle panels
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('arena-panel').style.display = 'block';
    document.getElementById('display-topic').innerText = topic;
    document.getElementById('chat-log').innerHTML = '';

    try {
      // --- ROUND 1: OPENINGS ---
      updateStatus(`Consulting ${nameA}...`, true);
      const systemA = `You are a professional debate AI representing "${nameA}". Your goal is to passionately defend your stance on the topic: "${topic}". Keep your total response under 3 descriptive sentences.`;
      const openingA = await callGemini(key, systemA, `Your starting point is: "${premiseA}". Write your sharp opening statement.`);
      appendChatBubble('side-a', `${nameA} (Opening)`, openingA);

      updateStatus(`Consulting ${nameB}...`, true);
      const systemB = `You are a professional debate AI representing "${nameB}". Your goal is to passionately oppose the arguments of your rival on the topic: "${topic}". Keep your total response under 3 descriptive sentences.`;
      const openingB = await callGemini(key, systemB, `Your starting point is: "${premiseB}". Write your sharp opening statement.`);
      appendChatBubble('side-b', `${nameB} (Opening)`, openingB);

      // --- ROUND 2: REBUTTALS ---
      updateStatus(`${nameA} is building counter-arguments...`, true);
      const rebuttalA = await callGemini(key, systemA, `Your opening statement was: "${openingA}". Your opponent countered with: "${openingB}". Deliver a quick, biting rebuttal pointing out flaws in their logic.`);
      appendChatBubble('side-a', `${nameA} (Rebuttal)`, rebuttalA);

      updateStatus(`${nameB} is building counter-arguments...`, true);
      const rebuttalB = await callGemini(key, systemB, `Your opening statement was: "${openingB}". Your opponent argued: "${rebuttalA}". Deliver a quick, biting rebuttal pointing out flaws in their logic.`);
      appendChatBubble('side-b', `${nameB} (Rebuttal)`, rebuttalB);

      // --- ROUND 3: JUDGEMENT ---
      updateStatus(`Summoning the Arena Judge...`, true);
      const systemJudge = "You are an completely neutral, analytical courtroom judge analyzing a debate. You must critically weigh both sides and deliver an absolute winner based on clarity, logic, and structure. Keep your decision exactly between 4-5 sentences.";
      const verdictText = await callGemini(key, systemJudge, `Topic: ${topic}\n\n[SIDE A - ${nameA}]:\nOpening: ${openingA}\nRebuttal: ${rebuttalA}\n\n[SIDE B - ${nameB}]:\nOpening: ${openingB}\nRebuttal: ${rebuttalB}\n\nDetermine who structured a better argument and name them the definitive winner.`);
      appendChatBubble('judge', '⚖️ Final Verdict Evaluation', verdictText);

      updateStatus("Simulation Terminated Successfully.");

    } catch (error) {
      console.error(error);
      appendChatBubble('judge', '⚠️ Core Connection Interrupted', `The simulation crashed. Reason: ${error.message}. Double-check your Gemini API key context or internet options and try again.`);
      updateStatus("Error event triggered.");
    }
  }

  function resetApp() {
    document.getElementById('arena-panel').style.display = 'none';
    document.getElementById('setup-panel').style.display = 'block';
    updateStatus("System Standby");
  }
</script>

</body>
</html>
