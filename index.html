<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debate Arena — Multi-Agent Multi-Device Sandbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #121214;
      --surface-card: #1a1a1e;
      --border: #26262b;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #10b981;
      --secondary: #8b5cf6;
      --accent: #f59e0b;
      --radius: 12px;
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 0.25rem;
      font-family: var(--font-mono);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 650px) { .grid-2 { grid-template-columns: 1fr; } }

    .input-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      background: var(--surface-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.85rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .button-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    button {
      background: var(--primary);
      color: #000;
      font-weight: 700;
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
      font-size: 0.95rem;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button.secondary-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.secondary-btn:hover { background: var(--surface-card); }

    /* Arena Stage View */
    .arena-panel { display: none; }
    
    .arena-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .chat-log {
      height: 480px;
      overflow-y: auto;
      border: 1px solid var(--border);
      background: #0d0d11;
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .bubble {
      max-width: 80%;
      padding: 1.2rem;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
      animation: fadeIn 0.25s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .bubble .meta {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
    }

    .bubble.side-a {
      background: rgba(16, 185, 129, 0.08);
      border-left: 4px solid var(--primary);
      align-self: flex-start;
    }
    .bubble.side-a .meta { color: var(--primary); }

    .bubble.side-b {
      background: rgba(139, 92, 246, 0.08);
      border-left: 4px solid var(--secondary);
      align-self: flex-end;
    }
    .bubble.side-b .meta { color: var(--secondary); }

    .bubble.judge {
      background: rgba(245, 158, 11, 0.06);
      border: 1px solid var(--accent);
      align-self: center;
      max-width: 95%;
      width: 100%;
    }
    .bubble.judge .meta { color: var(--accent); text-align: center; }

    .status-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 1rem;
    }
  </style>

  <!-- Load Firebase SDK Modules -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Initialize Firebase using debate-arena-44150
    const firebaseConfig = {
      apiKey: "AIzaSyCKWPF7RTqy7xiIOuBQixXcyuNu4YTCqVA",
      authDomain: "debate-arena-44150.firebaseapp.com",
      databaseURL: "https://debate-arena-44150-default-rtdb.firebaseio.com",
      projectId: "debate-arena-44150",
      storageBucket: "debate-arena-44150.firebasestorage.app",
      messagingSenderId: "210314799289",
      appId: "1:210314799289:web:5a2ab0e80f5a2e02235368",
      measurementId: "G-VXKNVW7EGB"
    };

    // Initialize Global Instances
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.dbRefs = { ref, set, onValue, push, update, get, db };
  </script>
</head>
<body>

<div class="container">
  <header>
    <h1>DEBATE ARENA</h1>
    <p>// MULTI-DEVICE ORCHESTRATION LAYER</p>
  </header>

  <!-- Config Panel -->
  <div id="setup-panel" class="card">
    <div class="grid-2">
      <div class="input-group">
        <label>Your Handle</label>
        <input type="text" id="player-name" placeholder="e.g. Maulik">
      </div>
      <div class="input-group">
        <label>Room Code (To Join)</label>
        <input type="text" id="room-id-input" placeholder="e.g. 4829">
      </div>
    </div>

    <div style="display:none;">
  <select id="ai-engine"></select>
  <input type="password" id="api-key">
</div>

    <div class="input-group">
      <label>Debate Motion / Topic</label>
      <input type="text" id="debate-topic" value="Should AI software development tools completely replace junior engineers?">
    </div>

    <div class="input-group">
      <label>Your Core Stance Thesis</label>
      <textarea id="player-premise" rows="3" placeholder="State your automated model perspective text argument strategy..."></textarea>
    </div>

    <div class="button-row">
      <button onclick="createRoom()">Create New Arena Room</button>
      <button class="secondary-btn" onclick="joinRoom()">Join Existing Room</button>
    </div>
  </div>

  <!-- Arena Panel -->
  <div id="arena-panel" class="card arena-panel">
    <div class="arena-header" style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <label style="margin:0;">Active Motion</label>
        <h3 id="active-topic-title" style="font-family:'Syne';">Topic Label</h3>
      </div>
      <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem;">
        <label id="room-display-id" style="font-family:var(--font-mono); font-size:1.1rem; color:var(--primary); margin:0;"></label>
        <button class="secondary-btn" onclick="resetApp()" style="padding: 0.3rem 0.8rem; font-size: 0.8rem; width: auto; margin-top: 0.25rem;">Exit Arena</button>
      </div>
    </div>

    <div class="chat-log" id="chat-box"></div>

    <div class="status-wrapper">
      <div id="status-console">Synchronizing room pipes...</div>
    </div>
  </div>
</div>

<script>
  let currentRoomCode = null;
  let playerSide = null; // 'side-a' or 'side-b'
  let localApiKey = null;
  let localEngine = 'gemini';
  let isProcessing = false;
  let renderedTurns = new Set();

  function validateInputs() {
    const name    = document.getElementById('player-name').value.trim();
    const key     = document.getElementById('api-key').value.trim();
    const topic   = document.getElementById('debate-topic').value.trim();
    const premise = document.getElementById('player-premise').value.trim();
    if (!name)    { alert('Please enter your handle name.'); return false; }
    if (!key)     { alert('Please paste your API key.'); return false; }
    if (!topic)   { alert('Please enter a debate topic.'); return false; }
    if (!premise) { alert('Please enter your stance / premise.'); return false; }
    return true;
  }

  function toggleKeyPlaceholder() {
    const engine = document.getElementById('ai-engine').value;
    const keyInput = document.getElementById('api-key');
    if(engine === 'gemini') keyInput.placeholder = "AIzaSy...";
    else if(engine === 'openai') keyInput.placeholder = "sk-proj-...";
    else keyInput.placeholder = "sk-ant-...";
  }

  // Multi-Engine Unified Dynamic Abstract Request Router
  async function invokeModelEndpoint(engine, key, systemPrompt, userMessage) {
    if (engine === 'gemini') {
      const models = [
        'gemini-2.0-flash',
        'gemini-2.5-flash',
        'gemini-2.0-flash-lite',
        'gemini-1.5-flash',
        'gemini-1.5-pro'
      ];
      
      const payload = {
        contents: [{ role: "user", parts: [{ text: `${systemPrompt}\n\nPrompt: ${userMessage}` }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 300 }
      };

      let lastError = null;
      for (const model of models) {
        try {
          const url = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`;
          const res = await fetch(url, { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify(payload) 
          });
          
          if (res.status === 404 || res.status === 429) {
            lastError = new Error(`Model ${model} not available (HTTP ${res.status})`);
            continue;
          }
          
          const data = await res.json();
          if (data.error) {
            const msg = data.error.message || '';
            const code = data.error.code || 0;
            if (code === 404 || code === 429 ||
                msg.includes('not found') || msg.includes('not supported') ||
                msg.includes('deprecated') || msg.includes('quota') || msg.includes('Quota')) {
              lastError = new Error(msg);
              continue;
            }
            throw new Error(msg);
          }
          
          if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
            throw new Error("Empty response from Gemini.");
          }
          return data.candidates[0].content.parts[0].text;
        } catch (e) {
          const msg = e.message || '';
          if (msg.includes('not found') || msg.includes('not supported') ||
              msg.includes('deprecated') || msg.includes('quota') || msg.includes('HTTP 404') || msg.includes('HTTP 429')) {
            lastError = e;
            continue;
          }
          throw e;
        }
      }
      throw lastError || new Error("All Gemini models failed. Check your API key.");
    } 
    
    else if (engine === 'openai') {
      const url = `https://api.openai.com/v1/chat/completions`;
      const payload = {
        model: "gpt-4o-mini",
        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: userMessage }],
        temperature: 0.7
      };
      const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` }, body: JSON.stringify(payload) });
      if(!res.ok) throw new Error((await res.json()).error?.message || "OpenAI gateway refusal.");
      return (await res.json()).choices[0].message.content;
    } 
    
    else if (engine === 'claude') {
      const url = `https://api.anthropic.com/v1/messages`;
      const payload = {
        model: "claude-3-5-haiku-20241022",
        max_tokens: 300,
        system: systemPrompt,
        messages: [{ role: "user", content: userMessage }]
      };
      const res = await fetch(url, { 
        method: "POST", 
        headers: { 
          "Content-Type": "application/json", 
          "x-api-key": key,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true" // Override safe Client CORS wrapper
        }, 
        body: JSON.stringify(payload) 
      });
      if(!res.ok) throw new Error((await res.json()).error?.message || "Anthropic node rejection.");
      return (await res.json()).content[0].text;
    }

    else if (engine === 'hackclub') {
      const res = await fetch('https://ai.hackclub.com/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({
          model: window._hcModel || 'google/gemini-2.5-flash',
          messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMessage }],
          max_tokens: 300,
          temperature: 0.7
        })
      });
      if (!res.ok) throw new Error((await res.json()).error?.message || 'Hack Club AI error. Check your key at ai.hackclub.com');
      return (await res.json()).choices[0].message.content;
    }
  }

  function appendTextBubble(role, identity, text) {
    const box = document.getElementById('chat-box');
    const b = document.createElement('div');
    b.className = `bubble ${role}`;
    b.innerHTML = `<div class="meta">${identity}</div><div>${text.replace(/\n/g, '<br>')}</div>`;
    box.appendChild(b);
    box.scrollTop = box.scrollHeight;
  }

  // Firebase Room Integration Logic
  window.createRoom = function() {
    if (!validateInputs()) return;

    const name = document.getElementById('player-name').value.trim();
    const { engine, key, model } = window.resolveEngineAndKey ? window.resolveEngineAndKey() : { engine: document.getElementById('ai-engine').value, key: document.getElementById('api-key').value.trim(), model: null };
    localEngine = engine;
    localApiKey = key;
    window._hcModel = model;
    const premise = document.getElementById('player-premise').value.trim();
    const topic = document.getElementById('debate-topic').value.trim();

    const code = Math.floor(1000 + Math.random() * 9000).toString();
    
    const setupData = {
      topic: topic,
      status: "waiting",
      player_A: {
        name: name,
        engine: localEngine,
        premise: premise
      }
    };

    playerSide = 'side-a';
    currentRoomCode = code;
    
    const { set, ref, db } = window.dbRefs;
    set(ref(db, `rooms/${code}`), setupData).then(() => {
      enterArenaView(code, topic);
      listenToArenaSession(code);
    }).catch(e => alert("Firebase error: " + e.message));
  };

  window.joinRoom = function() {
    const code = document.getElementById('room-id-input').value.trim();
    if(!code) return alert("Supply target room sequence.");
    if (!validateInputs()) return;

    const name = document.getElementById('player-name').value.trim();
    const { engine, key, model } = window.resolveEngineAndKey ? window.resolveEngineAndKey() : { engine: document.getElementById('ai-engine').value, key: document.getElementById('api-key').value.trim(), model: null };
    localEngine = engine;
    localApiKey = key;
    window._hcModel = model;
    const premise = document.getElementById('player-premise').value.trim();

    playerSide = 'side-b';
    currentRoomCode = code;

    const { ref, get, update, db, onValue } = window.dbRefs;
    
    // Quick single-fetch verification via onValue transient
    onValue(ref(db, `rooms/${code}`), (snapshot) => {
      const data = snapshot.val();
      if(!data) return alert("Target arena space array missing.");
      
      if(data.status === "waiting") {
        const updatePayload = {
          status: "ready",
          player_B: {
            name: name,
            engine: localEngine,
            premise: premise
          }
        };
        
        window.dbRefs.update(ref(db, `rooms/${code}`), updatePayload).then(() => {
          enterArenaView(code, data.topic);
          listenToArenaSession(code);
        }).catch(e => alert("Firebase error: " + e.message));
      } else {
        alert("This room is already full or has already started.");
      }
    }, { onlyOnce: true });
  };

  function enterArenaView(code, topic) {
    renderedTurns.clear();
    document.getElementById('chat-box').innerHTML = '';
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('arena-panel').style.display = 'block';
    document.getElementById('active-topic-title').innerText = topic;
    document.getElementById('room-display-id').innerText = `ROOM ID: ${code}`;
  }

  function listenToArenaSession(code) {
    const { ref, onValue, db } = window.dbRefs;
    
    onValue(ref(db, `rooms/${code}`), async (snapshot) => {
      const session = snapshot.val();
      if(!session) return;

      if(session.turns) {
        // Sort keys lexicographically to ensure chronological order of turns
        const sortedKeys = Object.keys(session.turns).sort();
        sortedKeys.forEach(k => {
          if (!renderedTurns.has(k)) {
            const t = session.turns[k];
            appendTextBubble(t.sender, t.label, t.text);
            renderedTurns.add(k);
          }
        });
      }

      // Turn Automation Orchestration Hook
      executeTurnEngineOrchestration(session);
    });
  }

  async function executeTurnEngineOrchestration(session) {
    if (isProcessing) return;

    // Check if it is actually our turn to execute the AI call
    let isOurTurn = false;
    if (session.status === "ready" && playerSide === 'side-a') isOurTurn = true;
    else if (session.status === "turn_b_opening" && playerSide === 'side-b') isOurTurn = true;
    else if (session.status === "turn_a_rebuttal" && playerSide === 'side-a') isOurTurn = true;
    else if (session.status === "turn_b_rebuttal" && playerSide === 'side-b') isOurTurn = true;
    else if (session.status === "judge_verdict" && playerSide === 'side-a') isOurTurn = true;

    if (!isOurTurn) {
      // Just update status message and return
      updateStatusDisplayOnly(session);
      return;
    }

    isProcessing = true;
    const { ref, push, update, db } = window.dbRefs;
    const statusText = document.getElementById('status-console');

    try {
      if (session.status === "ready") {
        statusText.innerText = "⚡ Generating Side A Openings...";
        const sys = `You are a professional debate agent representing "${session.player_A.name}". Defend the stance: "${session.topic}". Limit your output to 3 short sentences.`;
        const text = await invokeModelEndpoint(localEngine, localApiKey, sys, `Thesis: ${session.player_A.premise}. Begin.`);
        
        await push(ref(db, `rooms/${currentRoomCode}/turns`), { sender: 'side-a', label: `${session.player_A.name} (Opening)`, text });
        await update(ref(db, `rooms/${currentRoomCode}`), { status: "turn_b_opening" });
      }

      else if (session.status === "turn_b_opening") {
        statusText.innerText = "⚡ Generating Side B Openings...";
        const sys = `You are a professional debate agent representing "${session.player_B.name}". Oppose the stance: "${session.topic}". Limit your output to 3 short sentences.`;
        const text = await invokeModelEndpoint(localEngine, localApiKey, sys, `Thesis: ${session.player_B.premise}. Begin.`);
        
        await push(ref(db, `rooms/${currentRoomCode}/turns`), { sender: 'side-b', label: `${session.player_B.name} (Opening)`, text });
        await update(ref(db, `rooms/${currentRoomCode}`), { status: "turn_a_rebuttal" });
      }

      else if (session.status === "turn_a_rebuttal") {
        statusText.innerText = "⚡ Executing Side A Counter-Evaluation...";
        
        // Sort turns by key (chronological Firebase push ID)
        const turnsArray = Object.entries(session.turns)
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(entry => entry[1]);
          
        const opponentOpening = turnsArray[1].text;
        
        const sys = `You are a professional debate agent representing "${session.player_A.name}". Critique your opponent's opening argument. Limit to 3 short sentences.`;
        const text = await invokeModelEndpoint(localEngine, localApiKey, sys, `Opponent Opening: ${opponentOpening}. Provide rebuttal.`);
        
        await push(ref(db, `rooms/${currentRoomCode}/turns`), { sender: 'side-a', label: `${session.player_A.name} (Rebuttal)`, text });
        await update(ref(db, `rooms/${currentRoomCode}`), { status: "turn_b_rebuttal" });
      }

      else if (session.status === "turn_b_rebuttal") {
        statusText.innerText = "⚡ Executing Side B Counter-Evaluation...";
        
        const turnsArray = Object.entries(session.turns)
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(entry => entry[1]);
          
        const sideARebuttal = turnsArray[2].text;
        
        const sys = `You are a professional debate agent representing "${session.player_B.name}". Counter the rebuttal. Limit to 3 short sentences.`;
        const text = await invokeModelEndpoint(localEngine, localApiKey, sys, `Opponent Rebuttal: ${sideARebuttal}. Provide counter.`);
        
        await push(ref(db, `rooms/${currentRoomCode}/turns`), { sender: 'side-b', label: `${session.player_B.name} (Rebuttal)`, text });
        await update(ref(db, `rooms/${currentRoomCode}`), { status: "judge_verdict" });
      }

      else if (session.status === "judge_verdict") {
        statusText.innerText = "⚖️ Delivering Court Judgment panel matrix...";
        
        const turnsArray = Object.entries(session.turns)
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(entry => entry[1]);
          
        const logData = turnsArray.map(t => `${t.label}: ${t.text}`).join('\n\n');
        
        const sys = "You are a completely neutral, analytical courtroom judge analyzing a debate transcript. Pick a clear winner based on logic and structure. Keep your total answer precisely between 4-5 sentences.";
        const text = await invokeModelEndpoint(localEngine, localApiKey, sys, `Debate Log:\n${logData}\n\nDetermine winner.`);
        
        await push(ref(db, `rooms/${currentRoomCode}/turns`), { sender: 'judge', label: "⚖️ Final Verdict Evaluation", text });
        await update(ref(db, `rooms/${currentRoomCode}`), { status: "completed" });
      }
    } catch(e) {
      handleSimulationError(e);
    } finally {
      isProcessing = false;
    }
  }

  function updateStatusDisplayOnly(session) {
    const statusText = document.getElementById('status-console');
    if (session.status === "waiting") {
      statusText.innerText = `Waiting for another player to join (Room Code: ${currentRoomCode})...`;
    } else if (session.status === "ready") {
      statusText.innerText = `Waiting for ${session.player_A.name}'s opening statement...`;
    } else if (session.status === "turn_b_opening") {
      statusText.innerText = `Waiting for ${session.player_B.name}'s opening statement...`;
    } else if (session.status === "turn_a_rebuttal") {
      statusText.innerText = `Waiting for ${session.player_A.name}'s rebuttal...`;
    } else if (session.status === "turn_b_rebuttal") {
      statusText.innerText = `Waiting for ${session.player_B.name}'s rebuttal...`;
    } else if (session.status === "judge_verdict") {
      statusText.innerText = `Waiting for judge's verdict...`;
    } else if (session.status === "completed") {
      statusText.innerText = "Simulation Arena Complete.";
    }
  }

  function handleSimulationError(err) {
    console.error(err);
    isProcessing = false;
    const statusText = document.getElementById('status-console');
    statusText.innerHTML = `<span style="color:var(--danger)">Crashed: ${err.message}</span> <button onclick="resetApp()" class="secondary-btn" style="width:auto; display:inline-block; padding: 0.3rem 0.8rem; font-size:0.8rem; margin-left:0.5rem;">Start Over</button>`;
    appendTextBubble('judge', '⚠️ Connection / API Error', `The simulation encountered an error: ${err.message}. If this was a rate limit or API key issue, please verify your credentials and network connection.`);
  }

  function resetApp() {
    currentRoomCode = null;
    playerSide = null;
    localApiKey = null;
    localEngine = 'gemini';
    isProcessing = false;
    renderedTurns.clear();
    
    document.getElementById('arena-panel').style.display = 'none';
    document.getElementById('setup-panel').style.display = 'block';
    document.getElementById('status-console').innerText = "Synchronizing room pipes...";
    document.getElementById('chat-box').innerHTML = '';
  }
</script>
